<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open in Vyooo</title>
  <meta property="og:title" content="Vyooo" />
  <meta property="og:description" content="Open this profile in the Vyooo app." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://www.vyooo.com/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "DM Sans", system-ui, -apple-system, sans-serif;
      background: #120018;
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    .card { max-width: 420px; }
    h1 { font-size: 22px; font-weight: 600; margin: 0 0 8px; }
    p { opacity: 0.85; margin: 8px 0 20px; }
    .btn {
      display: inline-block;
      background: #f81945;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 999px;
    }
    .muted { font-size: 13px; opacity: 0.6; margin-top: 16px; }
    a { color: #f81945; }
  </style>
  <script>
    (function () {
      var ANDROID_STORE =
        "https://play.google.com/store/apps/details?id=com.vyooo";
      // Set once the App Store listing id is known.
      var IOS_STORE = ANDROID_STORE;

      function readRef() {
        var params = new URLSearchParams(window.location.search);
        var profile = (params.get("profile") || "").trim();
        var reel = (params.get("reel") || "").trim();

        // Path forms: /u/<username>, /@<username>, /r/<id>, legacy /profile|/reel.
        var segs = window.location.pathname.split("/").filter(Boolean);
        if (!profile && !reel && segs.length) {
          if (segs[0] === "u" && segs[1]) profile = decodeURIComponent(segs[1]);
          else if (segs[0] === "r" && segs[1]) reel = decodeURIComponent(segs[1]);
          else if (segs[0] === "profile" && segs[1])
            profile = decodeURIComponent(segs[1]);
          else if (segs[0] === "reel" && segs[1])
            reel = decodeURIComponent(segs[1]);
          else if (segs[0].charAt(0) === "@")
            profile = decodeURIComponent(segs[0].substring(1));
        }
        return { profile: profile, reel: reel };
      }

      var ref = readRef();
      var appUrl = ref.profile
        ? "vyooo://profile/" + encodeURIComponent(ref.profile)
        : ref.reel
        ? "vyooo://reel/" + encodeURIComponent(ref.reel)
        : null;

      var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
      var storeUrl = isIOS ? IOS_STORE : ANDROID_STORE;

      function ready() {
        var statusEl = document.getElementById("status");
        var btnEl = document.getElementById("store");

        if (ref.profile) {
          document.getElementById("title").textContent = "@" + ref.profile;
        }

        if (!appUrl) {
          statusEl.textContent = "Invalid link.";
          btnEl.textContent = "Get Vyooo";
          btnEl.href = storeUrl;
          btnEl.style.display = "inline-block";
          return;
        }

        btnEl.href = storeUrl;
        // Try to open the app immediately (no-op if Universal/App Link already
        // intercepted this URL before the browser loaded the page).
        var now = Date.now();
        window.location.href = appUrl;

        // If still here after the timeout, the app is not installed.
        setTimeout(function () {
          if (Date.now() - now < 2200) return;
          statusEl.textContent = "Don't have Vyooo yet?";
          btnEl.style.display = "inline-block";
        }, 1500);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", ready);
      } else {
        ready();
      }
    })();
  </script>
</head>
<body>
  <div class="card">
    <h1 id="title">Vyooo</h1>
    <p id="status">Opening Vyooo…</p>
    <a id="store" class="btn" href="#" style="display: none">Get Vyooo</a>
    <p class="muted">If the app didn't open, install Vyooo and tap the link again.</p>
  </div>
</body>
</html>
