name: flutter_callkit_incoming_maintained
description: Community-maintained fork of flutter_callkit_incoming — show CallKit incoming call UI in your Flutter app.
version: 3.1.2
homepage: https://github.com/ashutosh2014/flutter_callkit_incoming
repository: https://github.com/ashutosh2014/flutter_callkit_incoming
issue_tracker: https://github.com/ashutosh2014/flutter_callkit_incoming/issues
screenshots:
  - description: "lock screen"
    path: images/image6.jpg

false_secrets:
  - /example/**

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  json_annotation: ^4.9.0

dev_dependencies:
  build_runner: ^2.7.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.10.0

flutter:
  plugin:
    platforms:
      android:
        package: com.hiennv.flutter_callkit_incoming
        pluginClass: FlutterCallkitIncomingPlugin
      ios:
        pluginClass: FlutterCallkitIncomingPlugin

topics:
  - callkit
  - incoming
  - flutter-callkit-incoming
  - voip
